<script>
    document.addEventListener('DOMContentLoaded', function() {
        const workItems = document.querySelectorAll('.work-item');
        const filterLinks = document.querySelectorAll('.filters a');

        function updateActiveFilter() {
            let activeId = null;

            workItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                const windowHeight = window.innerHeight;

                if (rect.top < windowHeight && rect.bottom > 0) {
                    if (!activeId) {
                        activeId = item.id;
                    }
                }
            });

            filterLinks.forEach(link => {
                const href = link.getAttribute('href');
                const filterId = href ? href.replace('#', '') : '';

                if (filterId === activeId) {
                    link.querySelector('.filter').classList.add('active');
                } else {
                    link.querySelector('.filter').classList.remove('active');
                }
            });
        }

        window.addEventListener('scroll', updateActiveFilter);
        updateActiveFilter();
    });
</script>
<!-- Кнопка бургер-меню (видна только на мобильных) -->
<button class="burger-btn" id="burgerBtn">
    <img src="images/burger-icon_open.svg" alt="Меню" class="burger-icon" />
</button>

<script>
    document.addEventListener('DOMContentLoaded', function() {
    const burgerBtn = document.getElementById('burgerBtn');
    const menufilter = document.querySelector('.menufilter');
    const burgerIcon = burgerBtn.querySelector('.burger-icon');

    const burgerIconSrc = 'images/burger-icon_open.svg';
    const closeIconSrc = 'images/burger-icon_close.svg';

    // Открытие/закрытие меню по клику на бургер
    burgerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        burgerBtn.classList.toggle('active');
        menufilter.classList.toggle('active');

        if (burgerBtn.classList.contains('active')) {
            burgerIcon.src = closeIconSrc;
        } else {
            burgerIcon.src = burgerIconSrc;
        }
    });

    // Закрытие меню по клику вне его
    document.addEventListener('click', function(e) {
        if (!menufilter.contains(e.target) && !burgerBtn.contains(e.target)) {
            burgerBtn.classList.remove('active');
            menufilter.classList.remove('active');
            burgerIcon.src = burgerIconSrc;
        }
    });

    // Закрытие меню по клику на ссылку фильтра или навигации
    const menuLinks = document.querySelectorAll('.menufilter a');
    menuLinks.forEach(link => {
        link.addEventListener('click', function() {
            burgerBtn.classList.remove('active');
            menufilter.classList.remove('active');
            burgerIcon.src = burgerIconSrc;
        });
    });

    // ---- ОТСЛЕЖИВАНИЕ АКТИВНОГО ФИЛЬТРА (только для страниц с фильтрами) ----
    const workItems = document.querySelectorAll('.work-item');
    const filterLinks = document.querySelectorAll('.filters a');

    if (workItems.length > 0 && filterLinks.length > 0) {
        function updateActiveFilter() {
            let activeId = null;

            workItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                const windowHeight = window.innerHeight;

                if (rect.top < windowHeight && rect.bottom > 0) {
                    if (!activeId) {
                        activeId = item.id;
                    }
                }
            });

            filterLinks.forEach(link => {
                const href = link.getAttribute('href');
                const filterId = href ? href.replace('#', '') : '';

                if (filterId === activeId) {
                    link.querySelector('.filter').classList.add('active');
                } else {
                    link.querySelector('.filter').classList.remove('active');
                }
            });
        }

        window.addEventListener('scroll', updateActiveFilter);
        updateActiveFilter();
    }
});
</script>
