<!-- Кнопка бургер-меню (видна только на мобильных) -->
<button class="burger-btn" id="burgerBtn">
    <img src="images/burger-icon_open.svg" alt="Меню" class="burger-icon" />
</button>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ---- БУРГЕР-МЕНЮ ----
        const burgerBtn = document.getElementById('burgerBtn');
        const menuWrapper = document.querySelector('.menu-wrapper');
        const burgerIcon = burgerBtn.querySelector('.burger-icon');

        const burgerIconSrc = 'images/burger-icon_open.svg';
        const closeIconSrc = 'images/burger-icon_close.svg';

        // Открытие/закрытие меню
        burgerBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            burgerBtn.classList.toggle('active');
            menuWrapper.classList.toggle('active');

            if (burgerBtn.classList.contains('active')) {
                burgerIcon.src = closeIconSrc;
            } else {
                burgerIcon.src = burgerIconSrc;
            }
        });

        // Закрытие при клике вне меню
        document.addEventListener('click', function(e) {
            if (!menuWrapper.contains(e.target) && !burgerBtn.contains(e.target)) {
                burgerBtn.classList.remove('active');
                menuWrapper.classList.remove('active');
                burgerIcon.src = burgerIconSrc;
            }
        });

        // Закрытие при клике на любую ссылку в меню
        const menuLinks = document.querySelectorAll('.menu-wrapper a');
        menuLinks.forEach(link => {
            link.addEventListener('click', function() {
                burgerBtn.classList.remove('active');
                menuWrapper.classList.remove('active');
                burgerIcon.src = burgerIconSrc;
            });
        });

        // ---- АНИМАЦИЯ ПОЯВЛЕНИЯ (только для index.html) ----
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    document.querySelector('.hero-gif-layer').classList.add('blurred');
                } else {
                    document.querySelector('.hero-gif-layer').classList.remove('blurred');
                }
            });
        }, {
            threshold: 0.1
        });

        const elements = document.querySelectorAll('.fade-in-element');
        elements.forEach(el => observer.observe(el));
    });
</script>
